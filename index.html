<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Coloriage - Version Réaliste</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #534AB7;
      --primary-light: #AFA9EC;
      --primary-dark: #3C3489;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --bg: #F7F5FF;
      --card: #ffffff;
      --text: #2C2C2A;
      --text-muted: #888780;
      --border: rgba(83,74,183,0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }
    body { font-family: 'Baloo 2', cursive; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

    header { background: linear-gradient(135deg, #534AB7 0%, #7F77DD 100%); padding: 1.2rem 1rem 1rem; text-align: center; box-shadow: 0 4px 20px rgba(83,74,183,0.3); }
    header h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    header p { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 2px; }

    #tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 12px 1rem; background: #fff; border-bottom: 1px solid var(--border); }
    .tab { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text-muted); transition: all 0.15s; font-weight: 500; }
    .tab:hover { background: var(--primary-light); color: var(--primary-dark); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    #gallery-wrap { padding: 1rem; max-width: 760px; margin: 0 auto; }
    #gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    @media (max-width: 480px) { #gallery { grid-template-columns: repeat(3, 1fr); } }

    .thumb-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 8px; cursor: pointer; transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s; text-align: center; position: relative; overflow: hidden; }
    .thumb-card:hover { border-color: var(--primary); transform: scale(1.06); box-shadow: 0 6px 20px rgba(83,74,183,0.2); }
    .thumb-card svg { width: 100%; height: auto; display: block; background: white; border-radius: 8px; }
    .thumb-card p { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
    .thumb-done { border-color: var(--green) !important; }

    #coloring-screen { display: none; flex-direction: column; align-items: center; gap: 10px; padding: 1rem; max-width: 480px; margin: 0 auto; }
    .top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    #back-btn { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; font-size: 13px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text); font-weight: 500; }
    #back-btn:hover { background: var(--bg); border-color: var(--primary); }
    #print-btn { background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 14px; font-size: 13px; font-family: 'Baloo 2', cursive; cursor: pointer; font-weight: 500; }
    #print-btn:hover { background: var(--green-dark); }
    #img-title { font-size: 16px; font-weight: 700; color: var(--primary); }

    #canvas-wrap { background: #fff; border: 2.5px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; position: relative; box-shadow: 0 4px 20px rgba(83,74,183,0.1); }
    #canvas-wrap svg { width: 100%; height: auto; display: block; cursor: crosshair; background: white; }

    #progress-wrap { width: 100%; }
    #progress-bar-bg { background: #e9e6ff; border-radius: 10px; height: 10px; overflow: hidden; }
    #progress-bar { height: 10px; background: linear-gradient(90deg, var(--primary), #7F77DD); border-radius: 10px; transition: width 0.3s; }
    #progress-label { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 3px; }

    #tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .tool-btn { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; font-size: 12px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text); font-weight: 500; transition: all 0.15s; }
    .tool-btn:hover { background: var(--bg); }
    .tool-btn.active { border-color: var(--primary); color: var(--primary); background: #f0eeff; }

    #palette { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; width: 100%; }
    .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: var(--text); transform: scale(1.2); }

    #music-btn { position: fixed; bottom: 16px; right: 16px; background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 46px; height: 46px; font-size: 20px; cursor: pointer; z-index: 100; box-shadow: 0 4px 16px rgba(83,74,183,0.4); transition: background 0.2s, transform 0.15s; }
    #music-btn:hover { transform: scale(1.1); }

    @keyframes pop { 0%{transform:scale(0.6);opacity:0} 100%{transform:scale(1);opacity:1} }

    @media print {
      header, #tabs, #gallery-wrap, #tools, #palette, #back-btn, #print-btn, #music-btn, #progress-wrap, .top-row, #img-title { display: none !important; }
      body { background: white; padding: 0; }
      #coloring-screen { display: flex !important; max-width: 100%; padding: 0; }
      #canvas-wrap { border: none; box-shadow: none; max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎨 Jeu de Coloriage</h1>
  <p>50 images réalistes à colorier — Animaux, Nature, Véhicules, Nourriture</p>
</header>

<div id="tabs">
  <button class="tab active" onclick="showTab('all',this)">🌈 Tout</button>
  <button class="tab" onclick="showTab('animaux',this)">🐾 Animaux</button>
  <button class="tab" onclick="showTab('nature',this)">🌿 Nature</button>
  <button class="tab" onclick="showTab('vehicules',this)">🚗 Véhicules</button>
  <button class="tab" onclick="showTab('nourriture',this)">🍕 Nourriture</button>
</div>

<div id="gallery-wrap">
  <div id="gallery"></div>
</div>

<div id="coloring-screen">
  <div class="top-row">
    <button id="back-btn" onclick="goBack()">← Retour</button>
    <div id="img-title"></div>
    <button id="print-btn" onclick="printImage()">🖨 Imprimer</button>
  </div>
  <div id="canvas-wrap"></div>
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar" style="width:0%"></div></div>
    <div id="progress-label">0%</div>
  </div>
  <div id="tools">
    <button class="tool-btn active" id="btn-fill" onclick="setTool('fill')">🖌 Remplir</button>
    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">🧹 Gomme</button>
    <button class="tool-btn" onclick="resetColors()">🗑 Effacer tout</button>

let audioCtx=null,musicPlaying=false,musicInterval=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15){try{const ctx=getAudioCtx();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}}
function playClick(){playTone(440,0.08,'sine',0.12);}
function playFill(){playTone(523,0.06,'sine',0.1);setTimeout(()=>playTone(659,0.06,'sine',0.1),60);}
const MELODY=[262,294,330,349,392,440,494,523,494,440,392,349,330,294];
let melodyIdx=0;
function playMusicNote(){playTone(MELODY[melodyIdx%MELODY.length],0.35,'triangle',0.08);melodyIdx++;}
function toggleMusic(){
  const btn=document.getElementById('music-btn');
  if(musicPlaying){clearInterval(musicInterval);musicPlaying=false;btn.textContent='🎵';btn.style.background='#534AB7';}
  else{getAudioCtx();musicPlaying=true;btn.textContent='🔇';btn.style.background='#993C1D';playMusicNote();musicInterval=setInterval(playMusicNote,500);}
}

  const title = titresRestants[i % titresRestants.length];
  IMAGES.push({
    cat: cat,
    title: title,
    clickable: ['z1','z2','z3','z4','z5','z6'],
    full: `<ellipse id="z1" cx="50" cy="55" rx="28" ry="24" fill="white" stroke="#000000" stroke-width="2.5"/>
<circle id="z2" cx="35" cy="42" r="12" fill="white" stroke="#000000" stroke-width="2"/>
<circle id="z3" cx="65" cy="42" r="12" fill="white" stroke="#000000" stroke-width="2"/>
<rect id="z4" x="42" y="68" width="16" height="18" rx="4" fill="white" stroke="#000000" stroke-width="2"/>
<ellipse id="z5" cx="28" cy="68" rx="8" ry="5" fill="white" stroke="#000000" stroke-width="1.5"/>
<ellipse id="z6" cx="72" cy="68" rx="8" ry="5" fill="white" stroke="#000000" stroke-width="1.5"/>`
  });
}

// Build colored SVG string for thumbnail
function buildColoredSvg(idx){
  const img=IMAGES[idx];
  const f=savedFills[idx]||{};
  let svg=img.full;
  img.clickable.forEach(id=>{
    if(f[id]&&f[id]!=='white'){
      const re=new RegExp(`(id="${id}"[^>]*fill=")[^"]*(")`,'g');
      svg=svg.replace(re,`$1${f[id]}$2`);
    }
  });
  return svg;
}

function showTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGallery();
}

function renderGallery(){
  const g=document.getElementById('gallery');
  const filtered=currentTab==='all'?IMAGES:IMAGES.filter(i=>i.cat===currentTab);
  g.innerHTML='';
  filtered.forEach(img=>{
    const realIdx=IMAGES.indexOf(img);
    const f=savedFills[realIdx]||{};
    const isDone=img.clickable.every(id=>f[id]&&f[id]!=='white');
    const card=document.createElement('div');
    card.className='thumb-card'+(isDone?' thumb-done':'');
    card.onclick=()=>openImage(realIdx);
    const coloredSvg=buildColoredSvg(realIdx);
    card.innerHTML=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${coloredSvg}</svg><p>${img.title}</p>`;
    g.appendChild(card);
  });
}

function openImage(idx){
  currentIdx=idx;
  fills=Object.assign({},savedFills[idx]||{});
  playClick();
  document.getElementById('gallery-wrap').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('coloring-screen').style.display='flex';
  document.getElementById('img-title').textContent=IMAGES[idx].title;
  renderCanvas();
  updateProgress();
}

function goBack(){
  savedFills[currentIdx]=Object.assign({},fills);
  document.getElementById('gallery-wrap').style.display='block';
  document.getElementById('tabs').style.display='flex';
  document.getElementById('coloring-screen').style.display='none';
  renderGallery();
}

function renderCanvas(){
  const img=IMAGES[currentIdx];
  const wrap=document.getElementById('canvas-wrap');
  wrap.innerHTML=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" id="main-svg">${img.full}</svg>`;
  applyFills();
  document.getElementById('main-svg').addEventListener('click',onSVGClick);
}

function applyFills(){
  IMAGES[currentIdx].clickable.forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.setAttribute('fill',fills[id]||'white');
  });
}

function onSVGClick(e){
  const el=e.target;
  const img=IMAGES[currentIdx];
  if(!el.id||!img.clickable.includes(el.id))return;
  fills[el.id]=currentTool==='fill'?currentColor:'white';
  el.setAttribute('fill',fills[el.id]);
  savedFills[currentIdx]=Object.assign({},fills);
  playFill();
  updateProgress();
}

function updateProgress(){
  const img=IMAGES[currentIdx];
  const filled=img.clickable.filter(id=>fills[id]&&fills[id]!=='white').length;
  const pct=Math.round((filled/img.clickable.length)*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=pct+'%';
}

function resetColors(){
  fills={};
  savedFills[currentIdx]={};
  applyFills();
  updateProgress();
}

function setTool(t){
  currentTool=t;
  document.getElementById('btn-fill').classList.toggle('active',t==='fill');
  document.getElementById('btn-eraser').classList.toggle('active',t==='eraser');
}

function printImage(){window.print();}

function buildPalette(){
  const p=document.getElementById('palette');
  COLORS.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='color-btn'+(i===0?' active':'');
    btn.style.background=c;
    if(c==='#fff')btn.style.boxShadow='inset 0 0 0 1.5px #ccc';
    btn.onclick=()=>{
      document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentColor=c;
      setTool('fill');
    };
    p.appendChild(btn);
  });
}

buildPalette();
renderGallery();
</script>
</body>
</html>
