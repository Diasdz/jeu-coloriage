
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Coloriage</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #534AB7;
      --primary-light: #AFA9EC;
      --primary-dark: #3C3489;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --red: #E24B4A;
      --bg: #F7F5FF;
      --card: #ffffff;
      --text: #2C2C2A;
      --text-muted: #888780;
      --border: rgba(83,74,183,0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Baloo 2', cursive;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #534AB7 0%, #7F77DD 100%);
      padding: 1.2rem 1rem 1rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(83,74,183,0.3);
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }
    header p {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-top: 2px;
    }

    /* SCORE BAR */
    #scorebar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      padding: 10px 1rem;
      border-bottom: 1px solid var(--border);
    }
    #stars-display { font-size: 22px; letter-spacing: 2px; }
    #score-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

    /* TABS */
    #tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 12px 1rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 13px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      font-weight: 500;
    }
    .tab:hover { background: var(--primary-light); color: var(--primary-dark); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* GALLERY */
    #gallery-wrap { padding: 1rem; max-width: 760px; margin: 0 auto; }
    #gallery {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    @media (max-width: 480px) { #gallery { grid-template-columns: repeat(3, 1fr); } }

    .thumb-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
      text-align: center;
      position: relative;
    }
    .thumb-card:hover {
      border-color: var(--primary);
      transform: scale(1.06);
      box-shadow: 0 6px 20px rgba(83,74,183,0.2);
    }
    .thumb-card svg { width: 100%; height: auto; display: block; }
    .thumb-card p { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
    .thumb-done { border-color: var(--green) !important; background: #EAF3DE; }
    .thumb-stars { position: absolute; top: 4px; right: 4px; font-size: 9px; }

    /* COLORING SCREEN */
    #coloring-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 1rem;
      max-width: 480px;
      margin: 0 auto;
    }
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    #back-btn {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
    }
    #back-btn:hover { background: var(--bg); border-color: var(--primary); }
    #print-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      font-weight: 500;
    }
    #print-btn:hover { background: var(--green-dark); }
    #img-title { font-size: 16px; font-weight: 700; color: var(--primary); }

    #canvas-wrap {
      background: #fff;
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 100%;
      position: relative;
      box-shadow: 0 4px 20px rgba(83,74,183,0.1);
    }
    #canvas-wrap svg { width: 100%; height: auto; display: block; cursor: crosshair; }

    /* PROGRESS */
    #progress-wrap { width: 100%; }
    #progress-bar-bg {
      background: #e9e6ff;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }
    #progress-bar {
      height: 10px;
      background: linear-gradient(90deg, var(--primary), #7F77DD);
      border-radius: 10px;
      transition: width 0.3s;
    }
    #progress-label { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 3px; }

    /* TOOLS */
    #tools { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .tool-btn {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 12px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
      transition: all 0.15s;
    }
    .tool-btn:hover { background: var(--bg); }
    .tool-btn.active { border-color: var(--primary); color: var(--primary); background: #f0eeff; }

    /* PALETTE */
    #palette { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; width: 100%; }
    .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: var(--text); transform: scale(1.2); }

    /* CONGRATS OVERLAY */
    #congrats-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(83,74,183,0.35);
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: var(--radius);
    }
    #congrats-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.8rem 1.5rem;
      text-align: center;
      border: 2.5px solid var(--primary);
      max-width: 240px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 40px rgba(83,74,183,0.3);
    }
    #congrats-stars { font-size: 36px; margin-bottom: 8px; }
    #congrats-msg { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    #congrats-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }
    #congrats-btns { display: flex; gap: 8px; justify-content: center; }
    .c-btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-size: 12px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      font-weight: 500;
    }
    .c-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .c-btn:hover { opacity: 0.85; }

    /* MUSIC BTN */
    #music-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(83,74,183,0.4);
      transition: background 0.2s, transform 0.15s;
    }
    #music-btn:hover { transform: scale(1.1); }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* PRINT */
    @media print {
      header, #scorebar, #tabs, #gallery-wrap, #tools, #palette,
      #back-btn, #print-btn, #music-btn, #progress-wrap, .top-row,
      #img-title { display: none !important; }
      body { background: white; padding: 0; }
      #coloring-screen { display: flex !important; max-width: 100%; padding: 0; }
      #canvas-wrap { border: none; box-shadow: none; max-width: 100%; }
      #congrats-overlay { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎨 Jeu de Coloriage</h1>
  <p>50 images à colorier — Animaux, Nature, Véhicules, Nourriture</p>
</header>

<div id="scorebar">

</div>

  <button class="tab" onclick="showTab('animaux',this)">🐾 Animaux</button>
  <button class="tab" onclick="showTab('nature',this)">🌿 Nature</button>
  <button class="tab" onclick="showTab('vehicules',this)">🚗 Véhicules</button>
  <button class="tab" onclick="showTab('nourriture',this)">🍕 Nourriture</button>
</div>

<div id="gallery-wrap">
  <div id="gallery"></div>
</div>

<div id="coloring-screen">
  <div class="top-row">
    <button id="back-btn" onclick="goBack()">← Retour</button>
    <div id="img-title"></div>
    <button id="print-btn" onclick="printImage()">🖨 Imprimer</button>
  </div>
  <div id="canvas-wrap">
    <div id="congrats-overlay">
      <div id="congrats-box">
        <div id="congrats-stars"></div>
        <div id="congrats-msg"></div>
        <div id="congrats-sub"></div>
        <div id="congrats-btns">
          <button class="c-btn" onclick="closeCongratsAndPrint()">🖨 Imprimer</button>
          <button class="c-btn primary" onclick="goBack()">Autre image</button>
        </div>
      </div>
    </div>
  </div>
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar" style="width:0%"></div></div>
    <div id="progress-label">0%</div>
  </div>
  <div id="tools">
    <button class="tool-btn active" id="btn-fill" onclick="setTool('fill')">🖌 Remplir</button>
    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">🧹 Gomme</button>
    <button class="tool-btn" onclick="resetColors()">🗑 Effacer tout</button>
  </div>
  <div id="palette"></div>
</div>

<button id="music-btn" onclick="toggleMusic()" title="Musique">🎵</button>

let audioCtx=null,musicPlaying=false,musicInterval=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15){try{const ctx=getAudioCtx();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}}
function playClick(){playTone(440,0.08,'sine',0.12);}
function playFill(){playTone(523,0.06,'sine',0.1);setTimeout(()=>playTone(659,0.06,'sine',0.1),60);}
function playCongratsSound(){[523,659,784,1047].forEach((n,i)=>setTimeout(()=>playTone(n,0.15,'sine',0.15),i*120));}

let melodyIdx=0;
function playMusicNote(){playTone(MELODY[melodyIdx%MELODY.length],0.35,'triangle',0.08);melodyIdx++;}
function toggleMusic(){
  const btn=document.getElementById('music-btn');
  if(musicPlaying){clearInterval(musicInterval);musicPlaying=false;btn.textContent='🎵';btn.style.background='#534AB7';}
  else{getAudioCtx();musicPlaying=true;btn.textContent='🔇';btn.style.background='#993C1D';playMusicNote();musicInterval=setInterval(playMusicNote,500);}
}

function updateScoreBar(){
  const done=Object.keys(scores).length;
  const starCount=Math.min(5,Math.ceil(done/10));
  let s='';for(let i=0;i<5;i++)s+=i<starCount?'⭐':'☆';
  document.getElementById('stars-display').textContent=s;
  document.getElementById('score-label').textContent=done+' / '+IMAGES.length+' coloriages terminés';
}

function showTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGallery();
}

function renderGallery(){
  const g=document.getElementById('gallery');
  const filtered=currentTab==='all'?IMAGES:IMAGES.filter(i=>i.cat===currentTab);
  g.innerHTML='';
  filtered.forEach(img=>{
    const realIdx=IMAGES.indexOf(img);
    const card=document.createElement('div');
    card.className='thumb-card'+(scores[realIdx]?' thumb-done':'');
    card.onclick=()=>openImage(realIdx);
    let starsHtml='';
    if(scores[realIdx]){let st='';for(let i=0;i<scores[realIdx];i++)st+='⭐';starsHtml=`<div class="thumb-stars">${st}</div>`;}
    card.innerHTML=`${starsHtml}<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${img.full}</svg><p>${img.title}</p>`;
    g.appendChild(card);
  });
}

function openImage(idx){
  currentIdx=idx;fills={};
  playClick();
  document.getElementById('gallery-wrap').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('scorebar').style.display='none';
  document.getElementById('coloring-screen').style.display='flex';
  document.getElementById('congrats-overlay').style.display='none';
  document.getElementById('img-title').textContent=IMAGES[idx].title;
  renderCanvas();updateProgress();
}

function goBack(){
  document.getElementById('gallery-wrap').style.display='block';
  document.getElementById('tabs').style.display='flex';
  document.getElementById('scorebar').style.display='flex';
  document.getElementById('coloring-screen').style.display='none';
  document.getElementById('congrats-overlay').style.display='none';
  renderGallery();updateScoreBar();
}

function renderCanvas(){
  const img=IMAGES[currentIdx];
  const wrap=document.getElementById('canvas-wrap');
  const overlay=document.getElementById('congrats-overlay');
  wrap.innerHTML=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" id="main-svg">${img.full}</svg>`;
  wrap.appendChild(overlay);
  applyFills();
  document.getElementById('main-svg').addEventListener('click',onSVGClick);
}

function applyFills(){
  IMAGES[currentIdx].clickable.forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.setAttribute('fill',fills[id]||'white');
  });
}

function onSVGClick(e){
  const el=e.target;
  const img=IMAGES[currentIdx];
  if(!el.id||!img.clickable.includes(el.id))return;
  fills[el.id]=currentTool==='fill'?currentColor:'white';
  el.setAttribute('fill',fills[el.id]);
  playFill();updateProgress();checkDone();
}

function updateProgress(){
  const img=IMAGES[currentIdx];
  const filled=img.clickable.filter(id=>fills[id]&&fills[id]!=='white').length;
  const pct=Math.round((filled/img.clickable.length)*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=pct+'%';
}

function checkDone(){
  const img=IMAGES[currentIdx];
  const done=img.clickable.every(id=>fills[id]&&fills[id]!=='white');
  if(done){
    const colorVariety=new Set(img.clickable.map(id=>fills[id])).size;
    const starRating=colorVariety>=3?3:colorVariety>=2?2:1;
    scores[currentIdx]=starRating;
    playCongratsSound();
    let starStr='';for(let i=0;i<starRating;i++)starStr+='⭐';
    document.getElementById('congrats-stars').textContent=starStr;
    document.getElementById('congrats-msg').textContent='Bravo ! Coloriage terminé !';
    document.getElementById('congrats-sub').textContent=starRating===3?'Superbe coloriage coloré !':starRating===2?'Bien ! Essaie plus de couleurs !':'Continue comme ça !';
    document.getElementById('congrats-overlay').style.display='flex';
  }
}

function resetColors(){fills={};document.getElementById('congrats-overlay').style.display='none';applyFills();updateProgress();}
function setTool(t){currentTool=t;document.getElementById('btn-fill').classList.toggle('active',t==='fill');document.getElementById('btn-eraser').classList.toggle('active',t==='eraser');}
function printImage(){window.print();}
function closeCongratsAndPrint(){document.getElementById('congrats-overlay').style.display='none';setTimeout(()=>window.print(),200);}

function buildPalette(){
  const p=document.getElementById('palette');
  COLORS.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='color-btn'+(i===0?' active':'');
    btn.style.background=c;
    if(c==='#fff')btn.style.boxShadow='inset 0 0 0 1.5px #ccc';
    btn.onclick=()=>{
      document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');currentColor=c;setTool('fill');
    };
    p.appendChild(btn);
  });
}

buildPalette();renderGallery();updateScoreBar();
</script>
