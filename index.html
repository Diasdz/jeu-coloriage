<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake - Jeu du Serpent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .game-container {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 48px;
      padding: 20px;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .game-wrapper {
      background: #0a1f0a;
      border-radius: 24px;
      padding: 20px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 0 0 3px #ffd966, 0 0 0 6px #b8860b;
      cursor: pointer;
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .score-box {
      background: #2c1a0a;
      border-radius: 40px;
      padding: 10px 24px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.2);
    }

    .score-label {
      color: #ffd966;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .score-value {
      color: #f5e56b;
      font-size: 32px;
      font-weight: bold;
      line-height: 1;
      text-shadow: 0 2px 0 #5a3a0a;
    }

    .highscore-box {
      background: #1a2a0a;
      border-radius: 40px;
      padding: 10px 24px;
    }

    .highscore-label {
      color: #8bc34a;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .highscore-value {
      color: #c5e1a5;
      font-size: 28px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #2c1a0a;
      border: none;
      color: #ffd966;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 5px 0 #5a3a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #5a3a1a;
    }

    button:hover {
      background: #3e2a1a;
      color: #ffe6a3;
    }

    .arrow-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 60px;
    }

    .arrow-row {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .arrow-btn {
      background: #1f2a0a;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 28px;
      padding: 0;
      justify-content: center;
      box-shadow: 0 5px 0 #3a2a1a;
    }

    .status {
      background: #0f2a0a;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
      color: #ffd966;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .arrow-btn {
        width: 45px;
        height: 45px;
        font-size: 24px;
      }
      .score-value { font-size: 24px; }
      .highscore-value { font-size: 22px; }
      button { padding: 6px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <div class="game-wrapper">
      <canvas id="snakeCanvas" width="400" height="400"></canvas>
      
      <div class="info-panel">
        <div class="score-box">
          <div class="score-label">🍎 SCORE</div>
          <div class="score-value" id="scoreValue">0</div>
        </div>
        
        <div class="highscore-box">
          <div class="highscore-label">🏆 RECORD</div>
          <div class="highscore-value" id="highscoreValue">0</div>
        </div>
        
        <div class="status" id="statusText">▶ JEU EN COURS</div>
        
        <div class="controls">
          <button id="restartBtn">🔄 NOUVELLE PARTIE</button>
          <button id="pauseBtn">⏸ PAUSE</button>
        </div>
      </div>
      
      <!-- Touches tactiles / mobiles -->
      <div class="arrow-controls" style="margin-top: 20px;">
        <div class="arrow-row">
          <button class="arrow-btn" data-dir="up">⬆️</button>
        </div>
        <div class="arrow-row">
          <button class="arrow-btn" data-dir="left">⬅️</button>
          <button class="arrow-btn" data-dir="down">⬇️</button>
          <button class="arrow-btn" data-dir="right">➡️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Configuration
  const BOARD_SIZE = 20;    // 20x20 grille
  const CELL_SIZE = 20;      // pixels (400/20)
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  
  // État du jeu
  let snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
    {x: 7, y: 10}
  ];
  let direction = 'right';    // direction actuelle
  let nextDirection = 'right';
  let food = {x: 15, y: 10};
  let score = 0;
  let highScore = localStorage.getItem('snakeHighScore') || 0;
  let gameLoop = null;
  let isGameRunning = true;
  let isPaused = false;
  let gameSpeed = 100;        // ms par frame
  
  // Sons (Web Audio API)
  let audioCtx = null;
  
  // DOM elements
  const scoreElement = document.getElementById('scoreValue');
  const highscoreElement = document.getElementById('highscoreValue');
  const statusElement = document.getElementById('statusText');
  const restartBtn = document.getElementById('restartBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  
  highscoreElement.textContent = highScore;
  
  // Initialisation audio
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  
  function playSound(type) {
    try {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'eat') {
        oscillator.frequency.value = 523.25; // Do
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        oscillator.start();
        oscillator.stop(now + 0.2);
      } else if (type === 'gameover') {
        oscillator.frequency.value = 220;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        oscillator.start();
        oscillator.stop(now + 0.5);
        
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.frequency.value = 174.61;
        gain2.gain.setValueAtTime(0.2, now + 0.2);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        osc2.start(now + 0.2);
        osc2.stop(now + 0.7);
      }
    } catch(e) {}
  }
  
  // Générer une nouvelle pomme à un endroit libre
  function generateRandomFood() {
    const maxAttempts = 2000;
    for (let i = 0; i < maxAttempts; i++) {
      const randX = Math.floor(Math.random() * BOARD_SIZE);
      const randY = Math.floor(Math.random() * BOARD_SIZE);
      if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
        food = {x: randX, y: randY};
        return true;
      }
    }
    // Si presque plus de place, recherche exhaustive
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        if (!snake.some(s => s.x === x && s.y === y)) {
          food = {x, y};
          return true;
        }
      }
    }
    return false; // Victoire ! partie gagnée
  }
  
  // Mise à jour du score affiché
  function updateUI() {
    scoreElement.textContent = score;
    if (score > highScore) {
      highScore = score;
      highscoreElement.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
  }
  
  // Mouvement du serpent
  function moveSnake() {
    if (!isGameRunning || isPaused) return false;
    
    // Appliquer la direction
    direction = nextDirection;
    
    // Calcul de la nouvelle tête
    let newHead = { ...snake[0] };
    switch (direction) {
      case 'right': newHead.x += 1; break;
      case 'left': newHead.x -= 1; break;
      case 'up': newHead.y -= 1; break;
      case 'down': newHead.y += 1; break;
    }
    
    // Vérifier si on mange la pomme
    const willEat = (newHead.x === food.x && newHead.y === food.y);
    
    // Ajouter la nouvelle tête
    snake.unshift(newHead);
    if (!willEat) {
      snake.pop();
    } else {
      // Augmenter score et générer nouvelle pomme
      score++;
      updateUI();
      playSound('eat');
      const success = generateRandomFood();
      if (!success) {
        // Victoire : le serpent remplit tout le plateau !
        gameOver(true);
        return false;
      }
      // Augmenter légèrement la vitesse (max speed = 60ms)
      if (gameSpeed > 60) {
        gameSpeed = Math.max(60, gameSpeed - 1.5);
        clearInterval(gameLoop);
        gameLoop = setInterval(gameTick, gameSpeed);
      }
    }
    
    // Vérifier collision avec les murs
    if (newHead.x < 0 || newHead.x >= BOARD_SIZE || newHead.y < 0 || newHead.y >= BOARD_SIZE) {
      gameOver(false);
      return false;
    }
    
    // Vérifier collision avec soi-même
    const selfCollision = snake.slice(1).some(segment => segment.x === newHead.x && segment.y === newHead.y);
    if (selfCollision) {
      gameOver(false);
      return false;
    }
    
    return true;
  }
  
  // Game Over
  function gameOver(isVictory = false) {
    if (!isGameRunning) return;
    isGameRunning = false;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = null;
    playSound('gameover');
    if (isVictory) {
      statusElement.textContent = '🏆 VICTOIRE ! TU AS GAGNÉ ! 🏆';
    } else {
      statusElement.textContent = '💀 GAME OVER 💀';
    }
    drawBoard(true);
  }
  
  // Réinitialiser la partie
  function resetGame() {
    // Réinitialiser les variables
    snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10},
      {x: 7, y: 10}
    ];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    gameSpeed = 100;
    isGameRunning = true;
    isPaused = false;
    pauseBtn.textContent = '⏸ PAUSE';
    statusElement.textContent = '▶ JEU EN COURS';
    
    updateUI();
    
    // Générer une pomme valide
    generateRandomFood();
    
    // Nettoyer l'ancien intervalle
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(gameTick, gameSpeed);
    
    // Redessiner
    drawBoard();
  }
  
  // Tick du jeu (appelé à intervalle)
  function gameTick() {
    if (!isGameRunning || isPaused) return;
    moveSnake();
    drawBoard();
  }
  
  // Gestion des touches clavier
  function changeDirection(newDir) {
    if (!isGameRunning || isPaused) return;
    
    const opposite = {
      'up': 'down',
      'down': 'up',
      'left': 'right',
      'right': 'left'
    };
    
    if (opposite[newDir] !== direction) {
      nextDirection = newDir;
    }
  }
  
  // DESSIN : graphismes réalistes et joyeux
  function drawBoard(isGameOverDisplay = false) {
    ctx.clearRect(0, 0, 400, 400);
    
    // Grille de fond
    for (let i = 0; i <= BOARD_SIZE; i++) {
      ctx.beginPath();
      ctx.strokeStyle = '#2c4a2c';
      ctx.lineWidth = 0.5;
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, 400);
      ctx.stroke();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(400, i * CELL_SIZE);
      ctx.stroke();
    }
    
    // Dessin de la pomme (avec reflet)
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#e84118';
    ctx.fill();
    ctx.fillStyle = '#c92a0a';
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 2, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = '#f9a825';
    ctx.beginPath();
    ctx.rect(food.x * CELL_SIZE + 8, food.y * CELL_SIZE + 5, 3, 5);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 3, food.y * CELL_SIZE + CELL_SIZE/2 - 3, 1.5, 0, 2 * Math.PI);
    ctx.fill();
    
    // Dessin du serpent avec dégradé et yeux
    for (let i = 0; i < snake.length; i++) {
      const seg = snake[i];
      const x = seg.x * CELL_SIZE;
      const y = seg.y * CELL_SIZE;
      
      // Corps avec effet arrondi
      ctx.fillStyle = i === 0 ? '#7cb518' : '#5a9e2e';
      ctx.shadowBlur = 2;
      ctx.shadowColor = '#1a3a0a';
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, 5);
      ctx.fill();
      
      // Écailles (petits détails)
      ctx.fillStyle = '#9ccc5c';
      ctx.beginPath();
      ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, 4, 0, 2 * Math.PI);
      ctx.fill();
      
      // Yeux sur la tête
      if (i === 0) {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + 14, y + 7, 2.5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 6, y + 7, 2.5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#1a2a0a';
        ctx.beginPath();
        ctx.arc(x + 14.5, y + 6.5, 1.2, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 6.5, y + 6.5, 1.2, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + 15, y + 5, 0.6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 7, y + 5, 0.6, 0, 2 * Math.PI);
        ctx.fill();
        
        // langue (optionnelle)
        if (direction === 'right') {
          ctx.fillStyle = '#e85d04';
          ctx.beginPath();
          ctx.moveTo(x + 19, y + 10);
          ctx.lineTo(x + 24, y + 12);
          ctx.lineTo(x + 19, y + 14);
          ctx.fill();
        }
      }
    }
    
    ctx.shadowBlur = 0;
    
    // Message de pause / game over
    if (isPaused && isGameRunning) {
      ctx.font = 'bold 20px "Segoe UI"';
      ctx.fillStyle = '#ffd966';
      ctx.shadowBlur = 0;
      ctx.fillText('⏸ PAUSE', 155, 190);
      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#bcbc8c';
      ctx.fillText('Appuie sur ESPACE', 148, 230);
    }
    
    if (!isGameRunning && !isGameOverDisplay) {
      ctx.font = 'bold 24px "Segoe UI"';
      ctx.fillStyle = '#ffaa44';
      ctx.shadowBlur = 0;
      ctx.fillText('GAME OVER', 140, 190);
      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#ddcc88';
      ctx.fillText('Clique sur "Nouvelle partie"', 130, 230);
    }
  }
  
  // Helper pour roundRect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };
  }
  
  // Gestion des événements
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key === 'ArrowUp') changeDirection('up');
    else if (key === 'ArrowDown') changeDirection('down');
    else if (key === 'ArrowLeft') changeDirection('left');
    else if (key === 'ArrowRight') changeDirection('right');
    else if (key === ' ' || key === 'Space') {
      e.preventDefault();
      if (!isGameRunning) {
        resetGame();
      } else {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶ JOUER' : '⏸ PAUSE';
        statusElement.textContent = isPaused ? '⏸ PAUSE' : '▶ EN COURS';
        drawBoard();
      }
    } else if (key === 'r' || key === 'R') {
      resetGame();
    }
  });
  
  // Boutons tactiles
  document.querySelectorAll('.arrow-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const dir = btn.getAttribute('data-dir');
      if (dir) changeDirection(dir);
      // Petit effet haptique (vibration si supporté)
      if (navigator.vibrate) navigator.vibrate(20);
    });
  });
  
  restartBtn.addEventListener('click', () => {
    initAudio();
    resetGame();
  });
  
  pauseBtn.addEventListener('click', () => {
    if (!isGameRunning) {
      resetGame();
    } else {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶ JOUER' : '⏸ PAUSE';
      statusElement.textContent = isPaused ? '⏸ PAUSE' : '▶ EN COURS';
      drawBoard();
      if (!isPaused && !gameLoop) {
        gameLoop = setInterval(gameTick, gameSpeed);
      } else if (isPaused && gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
      } else if (!isPaused && !gameLoop && isGameRunning) {
        gameLoop = setInterval(gameTick, gameSpeed);
      }
    }
  });
  
  // Démarrer le jeu
  function startGame() {
    initAudio();
    resetGame();
  }
  
  startGame();
</script>
</body>
</html>
