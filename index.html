<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Coloriage Magique</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #534AB7;
      --primary-light: #AFA9EC;
      --primary-dark: #3C3489;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --bg: #F7F5FF;
      --card: #ffffff;
      --text: #2C2C2A;
      --text-muted: #888780;
      --border: rgba(83,74,183,0.2);
      --radius: 16px;
      --radius-sm: 10px;
    }
    
    body.dark {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #eee;
      --text-muted: #aaa;
      --border: rgba(255,255,255,0.1);
    }
    
    body { font-family: 'Baloo 2', cursive; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; transition: all 0.3s; }

    header { background: linear-gradient(135deg, #534AB7 0%, #7F77DD 100%); padding: 1.2rem 1rem 1rem; text-align: center; box-shadow: 0 4px 20px rgba(83,74,183,0.3); }
    header h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    header p { font-size: 14px; color: rgba(255,255,255,0.9); margin-top: 2px; }

    #tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 12px 1rem; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
    .tab { padding: 6px 20px; border-radius: 30px; border: 1.5px solid var(--border); background: var(--bg); font-size: 14px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text-muted); transition: all 0.2s; font-weight: 500; }
    .tab:hover { background: var(--primary-light); color: var(--primary-dark); transform: translateY(-1px); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(83,74,183,0.3); }

    #gallery-wrap { padding: 1rem; max-width: 780px; margin: 0 auto; }
    #gallery { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    @media (max-width: 560px) { #gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 380px) { #gallery { grid-template-columns: repeat(2, 1fr); } }

    .thumb-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 8px; cursor: pointer; transition: all 0.2s ease; text-align: center; position: relative; overflow: hidden; }
    .thumb-card:hover { border-color: var(--primary); transform: scale(1.03); box-shadow: 0 8px 20px rgba(83,74,183,0.2); }
    .thumb-card svg { width: 100%; height: auto; display: block; border-radius: 8px; background: white; }
    .thumb-card p { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-weight: 600; }
    .thumb-done { border-color: var(--green) !important; background: rgba(29,158,117,0.1); position: relative; }
    .thumb-done::after { content: "✓"; position: absolute; top: 5px; right: 8px; background: var(--green); color: white; width: 20px; height: 20px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    #coloring-screen { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 1rem; max-width: 540px; margin: 0 auto; background: var(--bg); border-radius: var(--radius); }
    .top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
    #back-btn, #next-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 40px; padding: 8px 18px; font-size: 14px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text); font-weight: 600; transition: 0.15s; }
    #back-btn:hover, #next-btn:hover { background: var(--bg); border-color: var(--primary); transform: scale(0.97); }
    #print-btn { background: var(--green); color: #fff; border: none; border-radius: 40px; padding: 8px 20px; font-size: 14px; font-family: 'Baloo 2', cursive; cursor: pointer; font-weight: 600; transition: 0.15s; }
    #print-btn:hover { background: var(--green-dark); transform: scale(0.97); }
    #img-title { font-size: 20px; font-weight: 700; color: var(--primary); background: var(--card); padding: 4px 16px; border-radius: 40px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

    #canvas-wrap { background: var(--card); border: 3px solid var(--primary-light); border-radius: var(--radius); overflow: hidden; width: 100%; position: relative; box-shadow: 0 8px 24px rgba(83,74,183,0.15); }
    #canvas-wrap svg { width: 100%; height: auto; display: block; cursor: pointer; background: white; }

    #progress-wrap { width: 100%; }
    #progress-bar-bg { background: rgba(83,74,183,0.2); border-radius: 20px; height: 12px; overflow: hidden; }
    #progress-bar { height: 12px; background: linear-gradient(90deg, var(--primary), #9b93f0); border-radius: 20px; transition: width 0.3s ease; }
    #progress-label { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 4px; font-weight: 500; }

    #tools { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 6px 0; }
    .tool-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 40px; padding: 8px 20px; font-size: 14px; font-family: 'Baloo 2', cursive; cursor: pointer; color: var(--text); font-weight: 600; transition: all 0.2s; }
    .tool-btn:hover { background: var(--bg); transform: translateY(-2px); }
    .tool-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(83,74,183,0.1); box-shadow: 0 2px 8px rgba(83,74,183,0.2); }

    #palette { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; background: var(--card); padding: 12px; border-radius: 60px; margin-top: 6px; }
    .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--primary); }

    #congrats-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(83,74,183,0.4); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 20; border-radius: var(--radius); }
    #congrats-box { background: var(--card); border-radius: 32px; padding: 2rem 1.5rem; text-align: center; border: 3px solid var(--primary); max-width: 280px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 20px 40px rgba(83,74,183,0.4); }
    #congrats-emoji { font-size: 52px; margin-bottom: 8px; }
    #congrats-msg { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    #congrats-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.2rem; }
    #congrats-btns { display: flex; gap: 12px; justify-content: center; }
    .c-btn { padding: 8px 18px; border-radius: 40px; border: 1.5px solid var(--border); font-size: 13px; font-family: 'Baloo 2', cursive; cursor: pointer; background: var(--card); color: var(--text); font-weight: 600; transition: 0.1s; }
    .c-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .c-btn:hover { opacity: 0.85; transform: scale(0.96); }

    #floating-controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 12px; z-index: 100; }
    .float-btn { background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 24px; cursor: pointer; box-shadow: 0 6px 18px rgba(83,74,183,0.5); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .float-btn:hover { transform: scale(1.08); background: var(--primary-dark); }
    #dark-mode-btn { background: #2c3e50; }
    #dark-mode-btn:hover { background: #1a2632; }

    @keyframes pop { 0%{transform:scale(0.6);opacity:0} 100%{transform:scale(1);opacity:1} }
    
    canvas.confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

    @media print {
      header, #tabs, #gallery-wrap, #tools, #palette, #back-btn, #next-btn, #print-btn, .float-btn, #progress-wrap, .top-row, #img-title, #floating-controls { display: none !important; }
      body { background: white; padding: 0; margin: 0; }
      #coloring-screen { display: flex !important; max-width: 100%; padding: 0; background: white; }
      #canvas-wrap { border: none; box-shadow: none; max-width: 100%; }
      #congrats-overlay { display: none !important; }
    }
  </style>
</head>
<body>

<div id="coloring-screen">

    <button id="next-btn">Suivant →</button>
    <button id="print-btn">🖨️</button>
  </div>
  <div id="canvas-wrap">
    <div id="congrats-overlay">

        <div id="congrats-msg">Magnifique !</div>

        </div>
      </div>
    </div>
  </div>
  <div id="progress-wrap">

  </div>
  <div id="tools">

    <button class="tool-btn" id="reset-btn">🗑️ Effacer tout</button>
  </div>
  <div id="palette"></div>
</div>

<div id="floating-controls">
  <button id="dark-mode-btn" class="float-btn" title="Mode nuit">🌙</button>
  <button id="music-btn" class="float-btn" title="Musique">🎵</button>

// --- 50 IMAGES avec formes variées et coloriables ---
const IMAGES = [];

// Fonction pour ajouter des images avec des formes uniques
function addImage(cat, title, shapes) {
  const clickableIds = shapes.map(s => s.id);
  const svgRaw = shapes.map(s => {
    if(s.type === 'ellipse') return `<ellipse id="${s.id}" cx="${s.cx}" cy="${s.cy}" rx="${s.rx}" ry="${s.ry}" fill="white" stroke="#333" stroke-width="2.5"/>`;
    if(s.type === 'circle') return `<circle id="${s.id}" cx="${s.cx}" cy="${s.cy}" r="${s.r}" fill="white" stroke="#333" stroke-width="2.5"/>`;
    if(s.type === 'rect') return `<rect id="${s.id}" x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="${s.rx || 4}" fill="white" stroke="#333" stroke-width="2.5"/>`;
    if(s.type === 'path') return `<path id="${s.id}" d="${s.d}" fill="white" stroke="#333" stroke-width="2.5"/>`;
    return '';
  }).join('');
  IMAGES.push({ cat, title, clickable: clickableIds, svgRaw });
}

// === STOCKAGE ===
let savedFills = JSON.parse(localStorage.getItem('coloring_saves')) || {};
let currentColor = COLORS[0];
let currentTool = 'fill';
let currentIdx = null;
let currentFills = {};
let currentTab = 'all';
let pipetteMode = false;

function persistFills() {
  if(currentIdx !== null) {
    savedFills[currentIdx] = { ...currentFills };
    localStorage.setItem('coloring_saves', JSON.stringify(savedFills));
  }
}

function getColoredSvgForThumb(idx) {
  const img = IMAGES[idx];
  const fills = savedFills[idx] || {};
  let svg = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${img.svgRaw}</svg>`;
  img.clickable.forEach(id => {
    if(fills[id] && fills[id] !== '#FFFFFF') {
      const regex = new RegExp(`(id="${id}"[^>]*fill=")[^"]*(")`, 'i');
      svg = svg.replace(regex, `$1${fills[id]}$2`);
    }
  });
  return svg;
}

function renderGallery() {
  const container = document.getElementById('gallery');
  const filtered = currentTab === 'all' ? IMAGES : IMAGES.filter(i => i.cat === currentTab);
  container.innerHTML = '';
  filtered.forEach((img, idx) => {
    const realIdx = IMAGES.indexOf(img);
    const fills = savedFills[realIdx] || {};
    const isComplete = img.clickable.every(id => fills[id] && fills[id] !== '#FFFFFF');
    const card = document.createElement('div');
    card.className = `thumb-card ${isComplete ? 'thumb-done' : ''}`;
    const coloredSvg = getColoredSvgForThumb(realIdx);
    card.innerHTML = `<div>${coloredSvg}</div><p>${img.title}</p>`;
    card.onclick = () => openImage(realIdx);
    container.appendChild(card);
  });
}

function openImage(index) {
  currentIdx = index;
  currentFills = { ...(savedFills[index] || {}) };
  document.getElementById('gallery-wrap').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('coloring-screen').style.display = 'flex';
  document.getElementById('congrats-overlay').style.display = 'none';
  document.getElementById('img-title').innerText = IMAGES[index].title;
  renderColoringCanvas();
  updateProgress();
  playSound('click');
}

function nextImage() {
  if(currentIdx !== null && currentIdx + 1 < IMAGES.length) {
    persistFills();
    openImage(currentIdx + 1);
  } else if(currentIdx + 1 >= IMAGES.length) {
    // Recommencer à la première
    persistFills();
    openImage(0);
  }
}

function renderColoringCanvas() {
  const img = IMAGES[currentIdx];
  const wrap = document.getElementById('canvas-wrap');
  const overlay = document.getElementById('congrats-overlay');
  wrap.innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" id="main-svg" style="cursor:pointer">${img.svgRaw}</svg>`;
  wrap.appendChild(overlay);
  img.clickable.forEach(id => {
    const el = document.getElementById(id);
    if(el && currentFills[id]) {
      el.setAttribute('fill', currentFills[id]);
    }
  });
  const svgEl = document.getElementById('main-svg');
  svgEl.addEventListener('click', onSvgClick);
}

function onSvgClick(e) {
  const target = e.target;
  if(!target || !target.id) return;
  const img = IMAGES[currentIdx];
  if(!img.clickable.includes(target.id)) return;
  
  if(pipetteMode) {
    const currentFill = target.getAttribute('fill') || '#FFFFFF';
    currentColor = currentFill;
    pipetteMode = false;
    document.getElementById('btn-pipette').classList.remove('active');
    document.querySelectorAll('.color-btn').forEach(btn => {
      if(btn.style.backgroundColor === currentColor) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    playSound('pipette');
    return;
  }
  
  const newColor = currentTool === 'fill' ? currentColor : '#FFFFFF';
  currentFills[target.id] = newColor;
  target.setAttribute('fill', newColor);
  persistFills();
  playSound('fill');
  updateProgress();
  checkCompletion();
}

function updateProgress() {
  const img = IMAGES[currentIdx];
  const total = img.clickable.length;
  if(total === 0) return;
  const colored = img.clickable.filter(id => currentFills[id] && currentFills[id] !== '#FFFFFF').length;
  const percent = Math.round((colored / total) * 100);
  document.getElementById('progress-bar').style.width = `${percent}%`;
  document.getElementById('progress-label').innerHTML = `${percent}% colorié ${percent === 100 ? '🎉' : '🎨'}`;
}

function checkCompletion() {
  const img = IMAGES[currentIdx];
  const allColored = img.clickable.every(id => currentFills[id] && currentFills[id] !== '#FFFFFF');
  if(allColored) {
    playSound('fanfare');
    launchConfetti();
    document.getElementById('congrats-overlay').style.display = 'flex';
  }
}

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.classList.add('confetti-canvas');
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  let particles = [];
  for(let i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 6 + 2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      speedY: Math.random() * 5 + 3,
      speedX: (Math.random() - 0.5) * 3
    });
  }
  
  let animation;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let stillActive = false;
    particles.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      if(p.y < canvas.height) stillActive = true;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    if(stillActive) requestAnimationFrame(animate);
    else canvas.remove();
  }
  animate();
  setTimeout(() => canvas.remove(), 3000);
}

function resetColors() {
  currentFills = {};
  persistFills();
  renderColoringCanvas();
  updateProgress();
  document.getElementById('congrats-overlay').style.display = 'none';
  playSound('reset');
}

function goBack() {
  persistFills();
  document.getElementById('gallery-wrap').style.display = 'block';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('coloring-screen').style.display = 'none';
  renderGallery();
}

function setTool(tool) {
  currentTool = tool;
  pipetteMode = false;
  document.getElementById('btn-fill').classList.toggle('active', tool === 'fill');
  document.getElementById('btn-eraser').classList.toggle('active', tool === 'eraser');
  document.getElementById('btn-pipette').classList.remove('active');
}

function enablePipette() {
  pipetteMode = true;
  document.getElementById('btn-pipette').classList.add('active');
  document.getElementById('btn-fill').classList.remove('active');
  document.getElementById('btn-eraser').classList.remove('active');
  playSound('click');
}

function printImage() { window.print(); }

// Sons
let audioCtx = null;
function getAudioCtx() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type='sine', vol=0.1) { 
  try { 
    const ctx = getAudioCtx(); 
    const o = ctx.createOscillator(); 
    const g = ctx.createGain(); 
    o.connect(g); 
    g.connect(ctx.destination); 
    o.type = type; 
    o.frequency.value = freq; 
    g.gain.setValueAtTime(vol, ctx.currentTime); 
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur); 
    o.start(); 
    o.stop(ctx.currentTime + dur); 
  } catch(e){} 
}
function playSound(type) {
  if(type === 'click') playTone(660, 0.08, 'sine', 0.08);
  if(type === 'fill') playTone(523, 0.07, 'sine', 0.1);
  if(type === 'fanfare') [523, 659, 784, 1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'triangle',0.12), i*130));
  if(type === 'pipette') playTone(880, 0.05, 'sine', 0.1);
  if(type === 'reset') playTone(330, 0.15, 'sine', 0.12);
}

// Musique
let musicInterval = null, musicActive = false, melodyPos = 0;
const melodyNotes = [262, 294, 330, 349, 392, 440, 494, 523];
function playMusicNote() { if(musicActive) playTone(melodyNotes[melodyPos % melodyNotes.length], 0.35, 'triangle', 0.05); melodyPos++; }
function toggleMusic() { 
  musicActive = !musicActive;
  const btn = document.getElementById('music-btn');
  if(musicActive) { 
    musicInterval = setInterval(playMusicNote, 520);
    btn.textContent = '🔊';
    btn.style.background = '#3C3489';
  } else { 
    clearInterval(musicInterval);
    btn.textContent = '🎵';
    btn.style.background = '#534AB7';
  }
}

// Dark mode
function toggleDarkMode() {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('dark-mode-btn');
  btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
  localStorage.setItem('darkMode', document.body.classList.contains('dark'));
}

// Palette UI
function buildPalette() {
  const container = document.getElementById('palette');
  COLORS.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = `color-btn ${i === 0 ? 'active' : ''}`;
    btn.style.backgroundColor = c;
    if(c === '#FFFFFF') btn.style.boxShadow = 'inset 0 0 0 1.5px #aaa';
    btn.onclick = () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentColor = c;
      setTool('fill');
    };
    container.appendChild(btn);
  });
}

// Initialisation
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    currentTab = tab.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderGallery();
  };
});

document.getElementById('back-btn').onclick = goBack;
document.getElementById('next-btn').onclick = nextImage;
document.getElementById('print-btn').onclick = printImage;
document.getElementById('btn-fill').onclick = () => setTool('fill');
document.getElementById('btn-eraser').onclick = () => setTool('eraser');
document.getElementById('btn-pipette').onclick = enablePipette;
document.getElementById('reset-btn').onclick = resetColors;
document.getElementById('music-btn').onclick = toggleMusic;
document.getElementById('dark-mode-btn').onclick = toggleDarkMode;
document.getElementById('congrats-print').onclick = () => { document.getElementById('congrats-overlay').style.display = 'none'; setTimeout(()=>window.print(),100); };
document.getElementById('congrats-next').onclick = () => { goBack(); };

// Restaurer dark mode
if(localStorage.getItem('darkMode') === 'true') toggleDarkMode();

buildPalette();
renderGallery();
