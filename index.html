<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐍 Snake - 3 Niveaux (Vitesse Constante)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a2f1a 0%, #051a0a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 20px;
      overflow: hidden; /* Empêche tout défilement de la page */
    }

    .game-container {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 48px;
      padding: 20px;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .game-wrapper {
      background: #0a1f0a;
      border-radius: 24px;
      padding: 20px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 0 0 3px #ffd966, 0 0 0 6px #b8860b;
      cursor: pointer;
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .score-box {
      background: #2c1a0a;
      border-radius: 40px;
      padding: 8px 20px;
      text-align: center;
      min-width: 100px;
    }

    .score-label {
      color: #ffd966;
      font-size: 12px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .score-value {
      color: #f5e56b;
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
    }

    .highscore-box {
      background: #1a2a0a;
      border-radius: 40px;
      padding: 8px 20px;
      text-align: center;
    }

    .highscore-label {
      color: #8bc34a;
      font-size: 11px;
    }

    .highscore-value {
      color: #c5e1a5;
      font-size: 24px;
      font-weight: bold;
    }

    .difficulty-selector {
      display: flex;
      gap: 10px;
      background: #0f2a0f;
      padding: 8px 16px;
      border-radius: 60px;
    }

    .difficulty-btn {
      background: #2a2a1a;
      border: none;
      color: #bcbc8c;
      font-size: 14px;
      font-weight: bold;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .difficulty-btn.active {
      background: #ffaa33;
      color: #2a2a0a;
      box-shadow: 0 0 10px #ffaa33;
    }

    .difficulty-btn.easy:hover { background: #5a9e4e; color: white; }
    .difficulty-btn.medium:hover { background: #e09d3e; color: white; }
    .difficulty-btn.hard:hover { background: #c92a2a; color: white; }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: #2c1a0a;
      border: none;
      color: #ffd966;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 0 #5a3a1a;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #5a3a1a;
    }

    .status {
      background: #0f2a0a;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      color: #ffd966;
      font-size: 12px;
      text-transform: uppercase;
    }

    .arrow-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 15px;
    }

    .arrow-row {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .arrow-btn {
      background: #1f2a0a;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 26px;
      padding: 0;
      justify-content: center;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 0 #3a2a1a;
    }

    .speed-info {
      background: #0a1a0a;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #aac88a;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 650px) {
      .info-panel { justify-content: center; }
      .difficulty-selector { order: 1; }
      .arrow-btn { width: 45px; height: 45px; font-size: 22px; }
      .score-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <div class="game-wrapper">
      <canvas id="snakeCanvas" width="400" height="400"></canvas>
      
      <div class="info-panel">
        <div class="score-box">
          <div class="score-label">🍎 SCORE</div>
          <div class="score-value" id="scoreValue">0</div>
        </div>
        
        <div class="highscore-box">
          <div class="highscore-label">🏆 RECORD</div>
          <div class="highscore-value" id="highscoreValue">0</div>
        </div>
        
        <div class="difficulty-selector">
          <button class="difficulty-btn easy" data-diff="easy">🌿 FACILE</button>
          <button class="difficulty-btn medium active" data-diff="medium">⚡ MOYEN</button>
          <button class="difficulty-btn hard" data-diff="hard">🔥 DIFFICILE</button>
        </div>
        
        <div class="status" id="statusText">▶ EN JEU</div>
        
        <div class="controls">
          <button id="restartBtn">🔄 NOUVEAU</button>
          <button id="pauseBtn">⏸ PAUSE</button>
        </div>
      </div>
      
      <div class="speed-info" id="speedInfo">
        🐢 Vitesse constante • Le jeu ne s'accélère pas !
      </div>
      
      <div class="arrow-controls">
        <div class="arrow-row">
          <button class="arrow-btn" data-dir="up">⬆️</button>
        </div>
        <div class="arrow-row">
          <button class="arrow-btn" data-dir="left">⬅️</button>
          <button class="arrow-btn" data-dir="down">⬇️</button>
          <button class="arrow-btn" data-dir="right">➡️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // === CONFIGURATION ===
  const BOARD_SIZE = 20;
  const CELL_SIZE = 20;
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  
  // Niveaux de difficulté avec VITESSE CONSTANTE (n'augmente jamais)
  const DIFFICULTY = {
    easy: { 
      speed: 150,           // lent
      wallCollision: false, // téléportation
      color: '#5a9e4e', 
      name: '🌿 FACILE',
      description: 'Téléportation • Lent'
    },
    medium: { 
      speed: 100,           // normal
      wallCollision: true,  // collision mur = mort
      color: '#e09d3e', 
      name: '⚡ MOYEN',
      description: 'Murs mortels • Normal'
    },
    hard: { 
      speed: 65,            // rapide
      wallCollision: true,  // collision mur = mort
      color: '#c92a2a', 
      name: '🔥 DIFFICILE',
      description: 'Murs mortels • Rapide'
    }
  };
  
  let currentDifficulty = 'medium';
  let gameSpeed = DIFFICULTY.medium.speed;
  
  // État du jeu
  let snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10},
    {x: 7, y: 10}
  ];
  let direction = 'right';
  let nextDirection = 'right';
  let food = {x: 15, y: 10};
  let score = 0;
  let highScore = localStorage.getItem('snakeHighScore') || 0;
  let gameLoop = null;
  let isGameRunning = true;
  let isPaused = false;
  let wallTeleport = false;
  
  // Sons
  let audioCtx = null;
  
  // DOM elements
  const scoreElement = document.getElementById('scoreValue');
  const highscoreElement = document.getElementById('highscoreValue');
  const statusElement = document.getElementById('statusText');
  const speedInfo = document.getElementById('speedInfo');
  const restartBtn = document.getElementById('restartBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  
  highscoreElement.textContent = highScore;
  
  // === EMPÊCHER LE DÉFILEMENT DE LA PAGE AVEC LES FLÈCHES ===
  function preventArrowScroll(e) {
    const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space', 'Spacebar'];
    if (keys.includes(e.key) || e.keyCode === 32 || (e.keyCode >= 37 && e.keyCode <= 40)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }
  
  // Désactiver le défilement pour toute la page
  window.addEventListener('keydown', preventArrowScroll);
  // Également pour l'élément canvas pour être sûr
  canvas.addEventListener('keydown', preventArrowScroll);
  
  // === AUDIO ===
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  
  function playSound(type) {
    try {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'eat') {
        oscillator.frequency.value = 523.25;
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        oscillator.start();
        oscillator.stop(now + 0.2);
      } else if (type === 'gameover') {
        oscillator.frequency.value = 220;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        oscillator.start();
        oscillator.stop(now + 0.5);
        
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.frequency.value = 174.61;
        gain2.gain.setValueAtTime(0.2, now + 0.2);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        osc2.start(now + 0.2);
        osc2.stop(now + 0.7);
      } else if (type === 'teleport') {
        oscillator.frequency.value = 880;
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        oscillator.start();
        oscillator.stop(now + 0.1);
      }
    } catch(e) {}
  }
  
  // === GÉNÉRATION DE NOURRITURE ===
  function generateRandomFood() {
    const maxAttempts = 2000;
    for (let i = 0; i < maxAttempts; i++) {
      const randX = Math.floor(Math.random() * BOARD_SIZE);
      const randY = Math.floor(Math.random() * BOARD_SIZE);
      if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
        food = {x: randX, y: randY};
        return true;
      }
    }
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        if (!snake.some(s => s.x === x && s.y === y)) {
          food = {x, y};
          return true;
        }
      }
    }
    return false;
  }
  
  // === MISE À JOUR UI ===
  function updateUI() {
    scoreElement.textContent = score;
    if (score > highScore) {
      highScore = score;
      highscoreElement.textContent = highScore;
      localStorage.setItem('snakeHighScore', highScore);
    }
  }
  
  // === GESTION DES MURS ===
  function handleWallCollision(head) {
    if (!wallTeleport) {
      if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) {
        return null;
      }
      return head;
    } else {
      let newHead = { ...head };
      let teleported = false;
      if (newHead.x < 0) { newHead.x = BOARD_SIZE - 1; teleported = true; }
      if (newHead.x >= BOARD_SIZE) { newHead.x = 0; teleported = true; }
      if (newHead.y < 0) { newHead.y = BOARD_SIZE - 1; teleported = true; }
      if (newHead.y >= BOARD_SIZE) { newHead.y = 0; teleported = true; }
      
      if (teleported) playSound('teleport');
      return newHead;
    }
  }
  
  // === MOUVEMENT DU SERPENT (vitesse constante) ===
  function moveSnake() {
    if (!isGameRunning || isPaused) return false;
    
    direction = nextDirection;
    
    let newHead = { ...snake[0] };
    switch (direction) {
      case 'right': newHead.x += 1; break;
      case 'left': newHead.x -= 1; break;
      case 'up': newHead.y -= 1; break;
      case 'down': newHead.y += 1; break;
    }
    
    const processedHead = handleWallCollision(newHead);
    if (processedHead === null) {
      gameOver(false);
      return false;
    }
    newHead = processedHead;
    
    const willEat = (newHead.x === food.x && newHead.y === food.y);
    
    snake.unshift(newHead);
    if (!willEat) {
      snake.pop();
    } else {
      score++;
      updateUI();
      playSound('eat');
      const success = generateRandomFood();
      if (!success) {
        gameOver(true);
        return false;
      }
    }
    
    const selfCollision = snake.slice(1).some(segment => segment.x === newHead.x && segment.y === newHead.y);
    if (selfCollision) {
      gameOver(false);
      return false;
    }
    
    return true;
  }
  
  // === GAME OVER ===
  function gameOver(isVictory = false) {
    if (!isGameRunning) return;
    isGameRunning = false;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = null;
    playSound('gameover');
    
    if (isVictory) {
      statusElement.textContent = '🏆 VICTOIRE ! PARFAIT ! 🏆';
    } else {
      statusElement.textContent = '💀 GAME OVER 💀';
    }
    drawBoard(true);
  }
  
  // === RÉINITIALISATION ===
  function resetGame() {
    snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10},
      {x: 7, y: 10}
    ];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    isGameRunning = true;
    isPaused = false;
    pauseBtn.textContent = '⏸ PAUSE';
    
    gameSpeed = DIFFICULTY[currentDifficulty].speed;
    wallTeleport = (currentDifficulty === 'easy');
    
    updateUI();
    generateRandomFood();
    
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(gameTick, gameSpeed);
    
    statusElement.textContent = `▶ ${DIFFICULTY[currentDifficulty].name}`;
    speedInfo.innerHTML = `⚡ Vitesse fixe : ${gameSpeed}ms • ${DIFFICULTY[currentDifficulty].description}`;
    drawBoard();
  }
  
  // === CHANGEMENT DE DIFFICULTÉ ===
  function setDifficulty(level) {
    currentDifficulty = level;
    wallTeleport = (level === 'easy');
    gameSpeed = DIFFICULTY[level].speed;
    
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.getAttribute('data-diff') === level) {
        btn.classList.add('active');
      }
    });
    
    resetGame();
  }
  
  // === TICK DU JEU ===
  function gameTick() {
    if (!isGameRunning || isPaused) return;
    moveSnake();
    drawBoard();
  }
  
  // === DIRECTION (avec empêchement du défilement) ===
  function changeDirection(newDir, event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (!isGameRunning || isPaused) return;
    const opposite = {
      'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
    };
    if (opposite[newDir] !== direction) {
      nextDirection = newDir;
    }
  }
  
  // === DESSIN ===
  function drawBoard(isGameOverDisplay = false) {
    ctx.clearRect(0, 0, 400, 400);
    
    // Grille
    for (let i = 0; i <= BOARD_SIZE; i++) {
      ctx.beginPath();
      ctx.strokeStyle = '#2c5a2c';
      ctx.lineWidth = 0.5;
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, 400);
      ctx.stroke();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(400, i * CELL_SIZE);
      ctx.stroke();
    }
    
    // Pomme
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#e84118';
    ctx.fill();
    ctx.fillStyle = '#c92a0a';
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 2, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = '#f9a825';
    ctx.fillRect(food.x * CELL_SIZE + 8, food.y * CELL_SIZE + 5, 3, 5);
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 3, food.y * CELL_SIZE + CELL_SIZE/2 - 3, 1.5, 0, 2 * Math.PI);
    ctx.fill();
    
    // Serpent
    const diffColor = DIFFICULTY[currentDifficulty].color;
    for (let i = 0; i < snake.length; i++) {
      const seg = snake[i];
      const x = seg.x * CELL_SIZE;
      const y = seg.y * CELL_SIZE;
      
      ctx.fillStyle = i === 0 ? diffColor : '#5a9e2e';
      ctx.shadowBlur = 2;
      ctx.shadowColor = '#1a3a0a';
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, 5);
      ctx.fill();
      
      ctx.fillStyle = '#9ccc5c';
      ctx.beginPath();
      ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, 4, 0, 2 * Math.PI);
      ctx.fill();
      
      if (i === 0) {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(x + 14, y + 7, 2.5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 6, y + 7, 2.5, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = '#1a2a0a';
        ctx.beginPath();
        ctx.arc(x + 14.5, y + 6.5, 1.2, 0, 2 * Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 6.5, y + 6.5, 1.2, 0, 2 * Math.PI);
        ctx.fill();
        
        if (direction === 'right') {
          ctx.fillStyle = '#e85d04';
          ctx.beginPath();
          ctx.moveTo(x + 19, y + 10);
          ctx.lineTo(x + 24, y + 12);
          ctx.lineTo(x + 19, y + 14);
          ctx.fill();
        }
      }
    }
    ctx.shadowBlur = 0;
    
    if (isPaused && isGameRunning) {
      ctx.font = 'bold 20px "Segoe UI"';
      ctx.fillStyle = '#ffd966';
      ctx.fillText('⏸ PAUSE', 155, 190);
    }
    
    if (!isGameRunning && !isGameOverDisplay) {
      ctx.font = 'bold 22px "Segoe UI"';
      ctx.fillStyle = '#ffaa44';
      ctx.fillText('GAME OVER', 140, 190);
    }
    
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = DIFFICULTY[currentDifficulty].color;
    ctx.fillText(DIFFICULTY[currentDifficulty].name, 10, 25);
    if (wallTeleport) {
      ctx.fillStyle = '#88aa66';
      ctx.fillText('🌀 Téléportation', 10, 40);
    }
    ctx.fillStyle = '#aac88a';
    ctx.fillText(`⚡ ${gameSpeed}ms fixe`, 10, 55);
  }
  
  // Helper roundRect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };
  }
  
  // === ÉVÉNEMENTS CLAVIER AVEC PREVENTDEFAULT ===
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    
    // Empêcher le défilement pour toutes les touches de direction
    if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' || 
        key === ' ' || key === 'Space' || key === 'Spacebar') {
      e.preventDefault();
      e.stopPropagation();
    }
    
    if (key === 'ArrowUp') changeDirection('up', e);
    else if (key === 'ArrowDown') changeDirection('down', e);
    else if (key === 'ArrowLeft') changeDirection('left', e);
    else if (key === 'ArrowRight') changeDirection('right', e);
    else if (key === ' ' || key === 'Space' || key === 'Spacebar') {
      e.preventDefault();
      if (!isGameRunning) resetGame();
      else {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? '▶ JOUER' : '⏸ PAUSE';
        statusElement.textContent = isPaused ? '⏸ PAUSE' : `▶ ${DIFFICULTY[currentDifficulty].name}`;
        drawBoard();
      }
    } else if (key === 'r' || key === 'R') {
      e.preventDefault();
      resetGame();
    }
  });
  
  // Également bloquer les flèches sur le canvas
  canvas.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      e.stopPropagation();
    }
  });
  
  // Rendre le canvas focusable pour capter les événements clavier
  canvas.setAttribute('tabindex', '0');
  canvas.style.outline = 'none';
  
  document.querySelectorAll('.arrow-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const dir = btn.getAttribute('data-dir');
      if (dir) changeDirection(dir);
      if (navigator.vibrate) navigator.vibrate(20);
    });
  });
  
  document.querySelectorAll('.difficulty-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const diff = btn.getAttribute('data-diff');
      setDifficulty(diff);
    });
  });
  
  restartBtn.addEventListener('click', () => { initAudio(); resetGame(); });
  pauseBtn.addEventListener('click', () => {
    if (!isGameRunning) resetGame();
    else {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶ JOUER' : '⏸ PAUSE';
      statusElement.textContent = isPaused ? '⏸ PAUSE' : `▶ ${DIFFICULTY[currentDifficulty].name}`;
      drawBoard();
    }
  });
  
  // LANCEMENT
  function startGame() {
    initAudio();
    setDifficulty('medium');
  }
  
  startGame();
</script>
</body>
</html>
